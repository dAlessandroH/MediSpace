<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Importar CSV - MedSpace</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <h1>MedSpace</h1>
        <p>Importador de decks</p>
      </div>
    </div>
    <nav class="nav">
      <a class="nav-link" href="index.html">Inicio</a>
      <a class="nav-link" href="review.html">Repasar</a>
      <a class="nav-link active" href="import.html">Importar CSV</a>
      <a class="nav-link" href="dashboard.html">Progreso</a>
      <a class="nav-link" href="planner.html">Plan y calendario</a>
      <a class="nav-link" href="settings.html">Ajustes</a>
    </nav>
  </aside>

  <main class="main">
    <header class="page-header">
      <div>
        <h2>Importar deck desde CSV</h2>
        <p>Compatible con tu formato: pregunta, opcion_a, opcion_b, opcion_c, opcion_d, respuesta, categoria, explicacion</p>
      </div>
    </header>

    <section class="panel form-panel">
      <div class="form-grid">
        <label>
          <span>Nombre del deck</span>
          <input type="text" id="deckName" placeholder="Ej. Corazon y mediastino" />
        </label>
        <label>
          <span>Materia</span>
          <input type="text" id="deckSubject" placeholder="Ej. Anatomia" />
        </label>
      </div>

      <label>
        <span>Archivo CSV</span>
        <input type="file" id="csvFile" accept=".csv,text/csv" />
      </label>

      <div class="toolbar wrap">
        <button class="btn primary" id="importBtn" type="button">Importar deck</button>
        <button class="btn" id="loadSampleBtn" type="button">Cargar ejemplo</button>
      </div>

      <div id="importStatus" class="notice hidden"></div>

      <div class="panel nested">
        <div class="panel-head">
          <h3>Vista previa</h3>
          <span class="muted" id="previewCount">0 filas</span>
        </div>
        <div id="previewTable" class="table-wrap"></div>
      </div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/csvParser.js"></script>
  <script src="js/import.js"></script>
</body>
</html>
