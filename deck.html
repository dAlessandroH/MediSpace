<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deck - MedSpace</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <h1>MedSpace</h1>
        <p>Vista de deck</p>
      </div>
    </div>

    <nav class="nav">
      <a class="nav-link" href="index.html">Inicio</a>
      <a class="nav-link" href="review.html">Simulador examen</a>
      <a class="nav-link" href="flashcards.html">Flashcards</a>
      <a class="nav-link" href="import.html">Importar CSV</a>
      <a class="nav-link" href="manual.html">Crear tarjeta</a>
      <a class="nav-link" href="dashboard.html">Progreso</a>
      <a class="nav-link" href="planner.html">Plan y calendario</a>
      <a class="nav-link" href="settings.html">Ajustes</a>
    </nav>
  </aside>

  <main class="main">
    <header class="page-header">
      <div>
        <h2 id="deckTitle">Deck</h2>
        <p id="deckMeta">Cargando...</p>
      </div>
      <div class="header-actions wrap">
        <button class="btn" id="editDeckToggleBtn" type="button">Editar deck</button>
        <button class="btn" id="resetDeckBtn" type="button">Reiniciar progreso</button>
        <button class="btn danger" id="deleteDeckBtn" type="button">Eliminar deck</button>
      </div>
    </header>



    <section class="panel hidden" id="editDeckPanel">
      <div class="panel-head">
        <h3>Editar deck o mazo</h3>
        <button class="btn" id="cancelEditDeckBtn" type="button">Cerrar</button>
      </div>
      <form id="editDeckForm" class="form-grid">
        <label>
          <span>Nombre del deck</span>
          <input id="editDeckName" type="text" maxlength="120" required />
        </label>
        <label>
          <span>Materia</span>
          <input id="editDeckSubject" type="text" maxlength="120" />
        </label>
        <label class="full-span" style="grid-column:1/-1;">
          <span>Descripcion</span>
          <textarea id="editDeckDescription" rows="4" placeholder="Opcional"></textarea>
        </label>
        <div class="item-actions" style="grid-column:1/-1;">
          <button class="btn primary" type="submit">Guardar cambios</button>
        </div>
      </form>
      <div id="editDeckStatus" class="notice info hidden"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h3>Tarjetas</h3>
        <input id="searchInput" type="text" placeholder="Buscar pregunta, frente o categoria" />
      </div>
      <div id="deckCards" class="list"></div>
    </section>
  </main>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/deck.js"></script>
</body>
</html>
